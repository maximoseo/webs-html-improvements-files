<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sign in · HTML Redesign Dashboard</title>
<meta name="description" content="HTML Redesign Dashboard login for authenticated operators.">
<!-- DASHBOARD PURPLE LOGO FAVICON (2026-04-26) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22purpleLogoGradient%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%237170ff%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%235e6ad2%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2224%22%20fill%3D%22url(%23purpleLogoGradient)%22/%3E%3Cpath%20d%3D%22M50%2018L18%2034l32%2016%2032-16-32-16z%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%227%22%20stroke-linejoin%3D%22round%22/%3E%3Cpath%20d%3D%22M18%2055l32%2016%2032-16%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%227%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3Cpath%20d%3D%22M18%2072l32%2016%2032-16%22%20fill%3D%22none%22%20stroke%3D%22white%22%20stroke-width%3D%227%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090A;
  --surface:#101114;
  --surface-2:#16181C;
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --text:#F7F8F8;
  --text-2:#C7CBD3;
  --muted:#8A8F98;
  --accent:#7170FF;
  --accent-2:#9B9AFF;
  --accent-dim:#5E6AD2;
  --success:#27A644;
  --danger:#F87171;
  --radius:12px;
  --radius-sm:8px;
  --ease:cubic-bezier(.2,0,0,1);
  --t:160ms;
}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  letter-spacing:-0.003em;
  line-height:1.5;
  position:relative;
  overflow-x:hidden;
}
/* Subtle ambient accent glow — no animation, respects reduced motion */
body::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1000px 600px at 15% 10%, rgba(113,112,255,.10), transparent 60%),
    radial-gradient(800px 500px at 85% 90%, rgba(94,106,210,.08), transparent 60%);
}
.shell{position:relative;z-index:1;width:100%;max-width:420px}

.brand{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:24px;color:var(--text);text-decoration:none;
}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px -6px rgba(113,112,255,.55);
}
.brand-mark svg{width:19px;height:19px;color:#fff}
.brand h1{font-size:16px;font-weight:600;letter-spacing:-0.01em}
.brand h1 span{color:var(--accent-2)}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px 28px;
  box-shadow:0 1px 2px rgba(0,0,0,.3), 0 24px 60px -20px rgba(0,0,0,.5);
}
.card-head{text-align:center;margin-bottom:24px}
.card-head h2{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
.card-head p{font-size:13.5px;color:var(--muted);line-height:1.5}

.form-group{margin-bottom:16px}
.form-label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:500;color:var(--text-2);
  margin-bottom:6px;letter-spacing:-0.002em;
}
.form-label .hint{color:var(--muted);font-weight:400;font-size:11.5px}
.input-wrap{position:relative}
.input-wrap svg.lead{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--muted);pointer-events:none}
.input-wrap button.toggle-pw{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:6px;border:0;background:transparent;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color var(--t) var(--ease),background var(--t) var(--ease);
}
.input-wrap button.toggle-pw:hover{color:var(--text);background:rgba(255,255,255,.06)}
.input-wrap button.toggle-pw svg{width:16px;height:16px}
input[type="text"],input[type="email"],input[type="password"]{
  width:100%;height:42px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0 14px 0 38px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  letter-spacing:-0.003em;
  outline:none;
  transition:border-color var(--t) var(--ease),box-shadow var(--t) var(--ease),background var(--t) var(--ease);
}
input::placeholder{color:var(--muted)}
input:hover{border-color:var(--border-strong)}
input:focus{
  border-color:rgba(113,112,255,.55);
  box-shadow:0 0 0 3px rgba(113,112,255,.14);
  background:rgba(113,112,255,.04);
}
input[type="password"]{padding-right:44px}

.btn{
  width:100%;height:42px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:0;border-radius:10px;
  background:var(--accent);color:#fff;
  font-family:inherit;font-size:14px;font-weight:600;letter-spacing:-0.003em;
  cursor:pointer;
  transition:background var(--t) var(--ease),transform var(--t) var(--ease),opacity var(--t) var(--ease);
  margin-top:8px;
}
.btn:hover:not(:disabled){background:var(--accent-dim)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn .spinner{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  animation:spin .7s linear infinite;display:none;
}
.btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.link-btn{
  display:block;width:100%;margin-top:14px;
  background:transparent;border:0;
  color:var(--accent-2);font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;padding:8px;border-radius:8px;
  transition:color var(--t) var(--ease),background var(--t) var(--ease);
}
.link-btn:hover{color:#fff;background:rgba(255,255,255,0.05)}
.link-btn.muted{color:var(--muted)}
.link-btn.muted:hover{color:var(--text-2);background:rgba(255,255,255,0.04)}

.msg{
  margin-top:14px;padding:10px 12px;border-radius:10px;
  font-size:13px;text-align:left;display:none;
  border:1px solid transparent;line-height:1.45;
}
.msg.error{
  display:block;background:rgba(248,113,113,.10);color:#fca5a5;border-color:rgba(248,113,113,.32);
}
.msg.success{
  display:block;background:rgba(39,166,68,.10);color:#7ae29a;border-color:rgba(39,166,68,.32);
}

.reset-section{display:none}
.reset-section.active{display:block}
.login-section.hidden{display:none}

.footnote{
  margin-top:18px;text-align:center;font-size:11.5px;color:var(--muted);
  letter-spacing:0.002em;
}
.footnote a{color:var(--muted);text-decoration:none;border-bottom:1px dashed rgba(255,255,255,.14)}
.footnote a:hover{color:var(--text-2)}

/* Focus ring — consistent across keyboard nav */
:where(button,a,input,textarea):focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:0.01ms !important;animation-duration:0.01ms !important}
}
@media (max-width:480px){
  body{padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-left)) max(16px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-right))}
  .card{padding:24px 20px;border-radius:14px}
  .brand{margin-bottom:18px}
  .card-head h2{font-size:18px}
  input[type="text"],input[type="email"],input[type="password"]{height:50px;font-size:16px}
  .btn{height:50px;font-size:15px}
  .input-wrap button.toggle-pw{width:36px;height:36px}
}
*{-webkit-tap-highlight-color:transparent}
.btn:active:not(:disabled){transform:scale(0.97)}

/* Page load fade-in */
.shell{animation:fadeInUp 0.4s var(--ease)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<main class="shell" role="main">
  <a href="/" class="brand" aria-label="HTML Redesign Dashboard home">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </span>
    <h1>HTML <span>Redesign</span></h1>
  </a>

  <section class="card" aria-labelledby="card-title">
    <header class="card-head">
      <h2 id="card-title">Sign in</h2>
      <p>Welcome back. Sign in to continue to the dashboard.</p>
    </header>

    <form id="login-section" class="login-section" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Email or username</label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="text" id="username" name="username" placeholder="you@example.com" autocomplete="username" autocapitalize="none" spellcheck="false" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          <span>Password</span>
          <button type="button" class="hint" style="background:none;border:0;color:inherit;cursor:pointer;font:inherit" onclick="showReset()">Forgot?</button>
        </label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
            <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.79 19.79 0 0 1 4.22-5.06"/>
              <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.86 19.86 0 0 1-3.16 4.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn" id="login-btn" type="submit">
        <span class="spinner" aria-hidden="true"></span>
        <span id="login-btn-label">Sign in</span>
      </button>
      <div class="msg" id="login-msg" role="alert" aria-live="polite"></div>
    </form>

    <div class="reset-section" id="reset-section" aria-hidden="true">
      <div class="form-group">
        <label class="form-label" for="reset-email">Email address</label>
        <div class="input-wrap">
          <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="reset-email" placeholder="you@example.com" value="service@maximo-seo.com" autocomplete="email">
        </div>
      </div>
      <button class="btn" id="reset-btn" type="button" onclick="doReset()">
        <span class="spinner" aria-hidden="true"></span>
        <span id="reset-btn-label">Send reset email</span>
      </button>
      <button class="link-btn muted" type="button" onclick="showLogin()">&larr; Back to sign in</button>
      <div class="msg" id="reset-msg" role="alert" aria-live="polite"></div>
    </div>
  </section>

  <p class="footnote">Authorized operators only. Need help? <a href="mailto:service@maximo-seo.com">service@maximo-seo.com</a></p>
</main>

<script>
const RESET_REQUEST_ENDPOINT = '/api/auth/request-reset';
const RESET_CONFIRM_ENDPOINT = '/api/auth/reset';

function $(id){return document.getElementById(id);}

function showReset(){
  $('login-section').classList.add('hidden');
  $('reset-section').classList.add('active');
  $('reset-section').setAttribute('aria-hidden','false');
  $('login-section').setAttribute('aria-hidden','true');
  setTimeout(function(){ var e = $('reset-email'); if(e){ e.focus(); e.select(); } }, 50);
}
function showLogin(){
  $('login-section').classList.remove('hidden');
  $('reset-section').classList.remove('active');
  $('reset-section').setAttribute('aria-hidden','true');
  $('login-section').setAttribute('aria-hidden','false');
  setTimeout(function(){ var u = $('username'); if(u) u.focus(); }, 50);
}

// Password visibility toggle
(function(){
  var btn = $('toggle-pw'); if(!btn) return;
  var pwd = $('password'); var eye = $('icon-eye'); var eyeOff = $('icon-eye-off');
  btn.addEventListener('click', function(){
    var show = pwd.type === 'password';
    pwd.type = show ? 'text' : 'password';
    eye.style.display = show ? 'none' : '';
    eyeOff.style.display = show ? '' : 'none';
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });
})();

function setLoading(btn, labelId, loadingText){
  btn.disabled = true;
  btn.classList.add('loading');
  var labelEl = $(labelId);
  btn.dataset._origLabel = labelEl.textContent;
  labelEl.textContent = loadingText;
}
function clearLoading(btn, labelId){
  btn.disabled = false;
  btn.classList.remove('loading');
  var labelEl = $(labelId);
  if(btn.dataset._origLabel){ labelEl.textContent = btn.dataset._origLabel; delete btn.dataset._origLabel; }
}

// Single-endpoint login: /api/auth/login sets dash_auth cookie atomically.
async function doLogin(){
  var btn = $('login-btn'); var msg = $('login-msg');
  var u = $('username').value.trim(); var p = $('password').value;
  if(!u || !p){
    msg.className = 'msg error';
    msg.textContent = 'Please enter your email or username and password.';
    return;
  }
  setLoading(btn, 'login-btn-label', 'Signing in…');
  msg.className = 'msg'; msg.textContent = '';
  try{
    var r = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body: JSON.stringify({ user:u, email:u, password:p })
    });
    var d = {}; try{ d = await r.json(); } catch(_){ d = {}; }
    if(r.ok && d.ok){
      msg.className = 'msg success';
      msg.textContent = 'Signed in. Redirecting…';
      var next = new URLSearchParams(location.search).get('next') || '/';
      requestAnimationFrame(function(){ location.replace(next); });
      return;
    }
    var err = d.error || '';
    if(r.status === 429)      err = 'Too many attempts. Please wait a minute and try again.';
    else if(r.status === 503) err = 'Authentication service is not configured. Contact the administrator.';
    else if(r.status >= 500)  err = 'Login service is restarting. Please try again in a minute.';
    else if(err === 'invalid_credentials' || !err) err = 'Invalid email or password.';
    msg.className = 'msg error'; msg.textContent = err;
  } catch(e){
    msg.className = 'msg error';
    msg.textContent = 'Network error. Please check your connection and try again.';
  }
  clearLoading(btn, 'login-btn-label');
}

async function doReset(){
  var btn = $('reset-btn'); var msg = $('reset-msg');
  var email = $('reset-email').value.trim();
  if(!email){ msg.className='msg error'; msg.textContent='Email address is required.'; return; }
  setLoading(btn, 'reset-btn-label', 'Sending…');
  msg.className = 'msg'; msg.textContent = '';
  try{
    var r = await fetch(RESET_REQUEST_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email:email, user:email, username:email })
    });
    var d = {}; try{ d = await r.json(); } catch(_){ d = {}; }
    if(d.ok){
      msg.className = 'msg success';
      msg.textContent = 'If reset email is configured, you will receive instructions shortly.';
    } else {
      msg.className = 'msg error';
      msg.textContent = d.error || 'Failed to send reset email.';
    }
  } catch(e){
    msg.className = 'msg error';
    msg.textContent = 'Network error. Please try again.';
  }
  clearLoading(btn, 'reset-btn-label');
}

document.getElementById('login-section').addEventListener('submit', function(ev){
  ev.preventDefault();
  doLogin();
});

// Autofocus username on load (respect reduced motion — just focus, no animation)
window.addEventListener('DOMContentLoaded', function(){
  var u = document.getElementById('username');
  if(u && !u.value) u.focus();
});
</script>
</body>
</html>
