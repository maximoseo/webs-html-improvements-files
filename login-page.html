<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Login</title>
<meta name="description" content="HTML Redesign Dashboard login for authenticated operators.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9672;</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#0a0e14 0%,#07090d 52%,#050608 100%);color:#e5edf8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
.card{background:rgba(16,20,27,.96);border:1px solid rgba(218,230,255,.13);border-radius:10px;padding:34px;width:100%;max-width:420px;box-shadow:0 24px 70px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#7aa2ff,#22c55e);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 28px rgba(122,162,255,.24)}
.logo-icon svg{width:22px;height:22px;stroke:#fff;stroke-width:2.5;fill:none}
.logo h1{font-size:1.3rem;font-weight:700;color:#f8fafc}
.logo h1 span{color:#9fc0ff}
.subtitle{text-align:center;color:#93a4ba;font-size:.88rem;margin-bottom:28px}
.form-group{margin-bottom:18px}
label{display:block;font-size:.76rem;font-weight:700;color:#9aa9bd;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input{width:100%;background:#090d13;border:1px solid rgba(218,230,255,.12);border-radius:9px;padding:12px 14px;color:#f1f5f9;font-size:.95rem;outline:none;transition:border-color .2s,box-shadow .2s,background .2s}
input:focus{border-color:#7aa2ff;box-shadow:0 0 0 3px rgba(122,162,255,.14);background:#0b1119}
input::placeholder{color:#475569}
.btn{width:100%;background:linear-gradient(135deg,#2f7dff,#1f9d72);border:none;border-radius:8px;color:#fff;font-size:.95rem;font-weight:700;padding:12px;cursor:pointer;transition:filter .2s,transform .2s;margin-top:8px;box-shadow:0 12px 30px rgba(47,125,255,.2)}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.forgot{display:block;text-align:center;color:#9fc0ff;font-size:.82rem;margin-top:16px;cursor:pointer;background:none;border:none;width:100%}
.forgot:hover{color:#c4d7ff;text-decoration:underline}
.msg{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:.85rem;text-align:center;display:none}
.msg.error{background:#2d1515;color:#f87171;border:1px solid #7f1d1d;display:block}
.msg.success{background:#0d2d1a;color:#4ade80;border:1px solid #166534;display:block}
.reset-section{display:none;margin-top:4px}
.back-link{display:block;text-align:center;color:#64748b;font-size:.82rem;margin-top:12px;cursor:pointer;background:none;border:none;width:100%}
.back-link:hover{color:#94a3b8}
@media(max-width:480px){.card{padding:28px 22px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <h1>HTML <span>Redesign</span></h1>
  </div>
  <p class="subtitle">Sign in to your dashboard</p>
  <form id="login-section">
    <div class="form-group"><label>Email or Username</label><input type="text" id="username" placeholder="you@example.com" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password" autocomplete="current-password"></div>
    <button class="btn" id="login-btn" type="submit">Sign In</button>
    <button class="forgot" type="button" onclick="showReset()">Forgot password?</button>
    <div class="msg" id="login-msg"></div>
  </form>
  <div class="reset-section" id="reset-section">
    <div class="form-group"><label>Email</label><input type="email" id="reset-email" value="service@maximo-seo.com"></div>
    <button class="btn" id="reset-btn" type="button" onclick="doReset()">Send Reset Email</button>
    <button class="back-link" type="button" onclick="showLogin()">&larr; Back to login</button>
    <div class="msg" id="reset-msg"></div>
  </div>
</div>
<script>
const RESET_REQUEST_ENDPOINT='/api/auth/request-reset';
const RESET_CONFIRM_ENDPOINT='/api/auth/reset';
function showReset(){document.getElementById('login-section').style.display='none';document.getElementById('reset-section').style.display='block';}
function showLogin(){document.getElementById('login-section').style.display='';document.getElementById('reset-section').style.display='none';}
// Single-endpoint login: /api/auth/login sets the dash_auth cookie atomically
// and redirects only after the response resolves.
async function doLogin(){
  var btn=document.getElementById('login-btn');
  var msg=document.getElementById('login-msg');
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value;
  if(!u||!p){msg.className='msg error';msg.textContent='Please enter your email or username and password.';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  msg.className='msg';msg.textContent='';
  try{
    var r=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      // Send user/email/username — backend accepts any of these keys.
      body:JSON.stringify({user:u,email:u,password:p})
    });
    var d={};
    try{ d=await r.json(); }catch(_j){ d={}; }
    if(r.ok && d.ok){
      msg.className='msg success';msg.textContent='Signed in! Redirecting...';
      var next = new URLSearchParams(location.search).get('next') || '/';
      requestAnimationFrame(function(){ location.replace(next); });
      return;
    }
    // Error branch — surface specific status where possible.
    var err = d.error || '';
    if(r.status===429){ err = 'Too many attempts. Please wait a minute and try again.'; }
    else if(r.status===503){ err = 'Authentication service is not configured. Contact the administrator.'; }
    else if(r.status>=500){ err = 'Login service is restarting. Please try again in a minute.'; }
    else if(err==='invalid_credentials' || !err){ err = 'Invalid credentials.'; }
    msg.className='msg error';msg.textContent=err;
  }catch(e){
    msg.className='msg error';msg.textContent='Network error. Please try again.';
  }
  btn.disabled=false;btn.textContent='Sign In';
}
async function doReset(){
  var btn=document.getElementById('reset-btn');
  var msg=document.getElementById('reset-msg');
  var email=document.getElementById('reset-email').value.trim();
  if(!email){msg.className='msg error';msg.textContent='Email required.';return;}
  btn.disabled=true;btn.textContent='Sending...';
  msg.className='msg';msg.textContent='';
  try{
    var r=await fetch(RESET_REQUEST_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,user:email,username:email})});
    var d=await r.json();
    if(d.ok){msg.className='msg success';msg.textContent='If reset email is configured, you will receive it shortly.';}
    else{msg.className='msg error';msg.textContent=d.error||'Failed to send reset email.';}
  }catch(e){msg.className='msg error';msg.textContent='Network error. Try again.';}
  btn.disabled=false;btn.textContent='Send Reset Email';
}
document.getElementById('login-section').addEventListener('submit',function(event){
  event.preventDefault();
  doLogin();
});
</script>
</body>
</html>
