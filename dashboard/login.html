<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Maximo SEO Dashboard</title>
    
    <!-- Link to Design System -->
    <link rel="stylesheet" href="./styles/design-tokens.css">
    <link rel="stylesheet" href="./styles/components.css">
    
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-surface) 100%);
            padding: 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--color-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-border);
            overflow: hidden;
        }

        .login-header {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }

        .login-header svg {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
            color: var(--color-primary);
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 0 0 0.5rem;
        }

        .login-header p {
            color: var(--color-text-muted);
            font-size: 0.875rem;
            margin: 0;
        }

        .login-body {
            padding: 0 2rem 2.5rem;
        }

        .forgot-password {
            font-size: 0.875rem;
            color: var(--color-primary);
            text-decoration: none;
            text-align: right;
            display: block;
            margin-top: 0.5rem;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-footer {
            padding: 1.5rem;
            text-align: center;
            background-color: var(--color-surface);
            border-top: 1px solid var(--color-border);
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .login-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius-full);
        }
        .theme-toggle:hover {
            background-color: var(--color-surface);
            color: var(--color-text);
        }

        /* DASHBOARD_LOGIN_SERVER_AUTH_2026_05_07 */
        .login-hint {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--color-text-muted);
            line-height: 1.4;
        }
        .login-message {
            min-height: 1.25rem;
            margin-top: 0.875rem;
            font-size: 0.8125rem;
            line-height: 1.45;
        }
        .login-message.error { color: var(--color-danger, #f87171); }
        .login-message.success { color: var(--color-success, #22c55e); }
    </style>
</head>
<body>

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <!-- Maximo Logo SVG Placeholder -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="currentColor">
                    <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-size="40" font-weight="bold" font-family="Inter, sans-serif">MAXIMO SEO</text>
                </svg>
                <h1>Welcome Back</h1>
                <p>Sign in to access HTML templates</p>
            </div>
            
            <div class="login-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Username</label>
                        <input class="form-input touch-target" type="text" id="email" name="username" required placeholder="maximoseo" autocomplete="username">
                        <div class="login-hint">Use the site operator username configured in the server runtime.</div>
                    </div>
                    
                    <div class="form-group mb-4">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-with-icon">
                            <input class="form-input touch-target" style="width: 100%; padding-right: 2.5rem;" type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                            <button type="button" id="togglePassword" class="input-icon-right" aria-label="Toggle password visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <a href="#" class="forgot-password" id="forgotPasswordBtn">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full touch-target" id="submitBtn">
                        <span id="btnText">Sign In</span>
                    </button>
                    <div class="login-message" id="loginMessage" role="alert" aria-live="polite"></div>
                </form>
            </div>
            
            <div class="login-footer">
                Part of <a href="https://maximo-seo.ai" target="_blank" rel="noopener noreferrer">Maximo SEO Platform</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const LOGIN_ENDPOINT = '/api/auth/login';

        function setLoginMessage(kind, message) {
            const msg = document.getElementById('loginMessage');
            if (!msg) return;
            msg.className = 'login-message' + (kind ? ' ' + kind : '');
            msg.textContent = message || '';
        }

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        // Password Toggle
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.style.color = type === 'text' ? 'var(--color-primary)' : 'var(--color-text-muted)';
        });

        // Server-auth login: the page never contains or stores the password.
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!identifier || !password) {
                setLoginMessage('error', 'Please enter your email or username and password.');
                return;
            }

            submitBtn.disabled = true;
            btnText.textContent = 'Signing in…';
            setLoginMessage('', '');

            try {
                const res = await fetch(LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ user: identifier, password: password })
                });
                let data = {};
                try { data = await res.json(); } catch (_) { data = {}; }

                if (res.ok && data.ok) {
                    try {
                        if (data.jwt) localStorage.setItem('dashboard_token', data.jwt);
                    } catch (_) {}
                    setLoginMessage('success', 'Signed in. Redirecting…');
                    const next = new URLSearchParams(window.location.search).get('next') || '/';
                    window.location.replace(next);
                    return;
                }

                let message = data.error || 'Login failed';
                if (res.status === 429) message = 'Too many attempts. Please wait a minute and try again.';
                else if (res.status === 503) message = 'Authentication service is not configured. Contact the administrator.';
                else if (res.status >= 500) message = 'Login service is restarting. Please try again in a minute.';
                else if (message === 'invalid_credentials') message = 'Invalid username or password.';
                setLoginMessage('error', message);
            } catch (err) {
                setLoginMessage('error', 'Network error. Please check your connection and try again.');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        });

        document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
            e.preventDefault();
            setLoginMessage('error', 'Password reset is handled by the site administrator. Contact service@maximo-seo.com.');
        });
    </script>
</body>
</html>
