<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Task 3.1: viewport meta -->
    <title>Dashboard | Maximo SEO</title>
    
    <link rel="stylesheet" href="./styles/design-tokens.css">
    <link rel="stylesheet" href="./styles/components.css">
    
    <style>
        /* Dashboard Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--color-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--color-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .main-content {
            padding: 2rem;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text);
        }

        /* Projects Section */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .project-info {
            flex: 1;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .project-name {
            font-weight: 600;
            font-size: 1rem;
            margin: 0 0 0.25rem;
        }

        .project-url {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            text-decoration: none;
        }

        .project-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
            font-size: 0.75rem;
            color: var(--color-text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--color-border);
        }

        .empty-state svg {
            color: var(--color-text-muted);
            margin-bottom: 1rem;
        }

        /* Responsive breakpoints */
        @media (max-width: 1024px) {
            .projects-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .projects-grid { grid-template-columns: 1fr; }
            .header { padding: 1rem; }
            .main-content { padding: 1rem; }
            
            .header-title-text { display: none; } /* Hide text, keep logo on mobile */
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                <span class="header-title-text">Maximo HTML Redesign</span>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-outline touch-target" id="themeToggle" aria-label="Toggle Theme">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
                <div class="user-avatar">A</div>
                <button class="btn btn-outline touch-target" id="logoutBtn">Logout</button>
            </div>
        </header>

        <main class="main-content">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="card stat-card">
                    <span class="stat-label">Total Projects</span>
                    <span class="stat-value" id="stat-total">12</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" style="color: var(--color-success)" id="stat-completed">8</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">In Progress</span>
                    <span class="stat-value" style="color: var(--color-warning)" id="stat-progress">3</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-label">Failed</span>
                    <span class="stat-value" style="color: var(--color-error)" id="stat-failed">1</span>
                </div>
            </div>

            <!-- Projects -->
            <div class="section-header">
                <h2 class="section-title">Recent Projects</h2>
                <div class="header-actions">
                    <button class="btn btn-outline touch-target">View History</button>
                    <button class="btn btn-primary touch-target" id="newRedesignBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        New Redesign
                    </button>
                </div>
            </div>

            <div class="projects-grid" id="projectsContainer">
                <!-- Data will be loaded dynamically here -->
            </div>
            
            <!-- Empty state hidden by default -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                <h3>No projects yet</h3>
                <p style="color: var(--color-text-muted)">Upload your first HTML file or URL to start a redesign.</p>
                <button class="btn btn-primary mt-4" style="margin-top: 1rem;">Start First Project</button>
            </div>

        </main>
    </div>

    <script type="module">
        import { requireAuth, sessionManager } from './auth/middleware.js';
        import { supabaseClient } from './auth/supabase-client.js';
        import { toast } from './components/toast.js';

        // 1. Require Authentication
        if (!requireAuth()) {
            console.warn("Redirecting to login...");
        } else {
            // Proceed to load data if authenticated
            loadDashboardData();
        }

        // Theme
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionManager.clearSession();
            window.location.href = '/login.html';
        });

        // New Redesign routing
        document.getElementById('newRedesignBtn').addEventListener('click', () => {
            window.location.href = '/project-detail.html'; // Create new empty project view
        });

        // Dynamic Data Loading
        async function loadDashboardData() {
            const session = sessionManager.getSession();
            if (!session || !session.access_token) return;

            const container = document.getElementById('projectsContainer');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '<div class="spinner" style="margin:2rem auto; border-top-color: var(--color-primary)"></div>';

            const response = await supabaseClient.getProjects(session.access_token);
            
            if (response.error) {
                container.innerHTML = '';
                toast.show('Failed to load projects: ' + (response.error.message || 'Unknown error'), 'error');
                return;
            }

            const projects = response.data;
            
            // Update Stats (Basic calculation)
            document.getElementById('stat-total').innerText = projects.length;
            // Fake stats for UI completeness pending real columns
            document.getElementById('stat-completed').innerText = projects.filter(p => (p.status || '').toLowerCase() === 'completed').length || 0;
            document.getElementById('stat-progress').innerText = projects.filter(p => (p.status || '').toLowerCase() === 'in_progress').length || 0;
            document.getElementById('stat-failed').innerText = projects.filter(p => (p.status || '').toLowerCase() === 'failed').length || 0;

            if (projects.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                renderProjects(projects, container);
            }
        }

        function renderProjects(projects, container) {
            container.innerHTML = '';
            
            projects.forEach(project => {
                const date = new Date(project.created_at).toLocaleDateString();
                const status = project.status || 'Pending';
                
                let badgeClass = 'badge-warning';
                if (status.toLowerCase() === 'completed') badgeClass = 'badge-success';
                if (status.toLowerCase() === 'failed') badgeClass = 'badge-error';

                const cardHtml = `
                <div class="card project-card" onclick="window.location.href='project-detail.html?id=${project.id}'">
                    <div class="project-info">
                        <div class="project-header">
                            <div>
                                <h3 class="project-name">${escapeHtml(project.name || 'Untitled Project')}</h3>
                                <a href="${escapeHtml(project.url || '#')}" class="project-url" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${escapeHtml(project.url || 'No URL')}</a>
                            </div>
                            <span class="badge ${badgeClass}">${escapeHtml(status)}</span>
                        </div>
                        <p style="font-size: 0.875rem; color: var(--color-text-muted); margin: 0;">Created ${date}</p>
                    </div>
                    <div class="project-footer">
                        <span title="${project.id}">ID: ${project.id.substring(0,8)}...</span>
                        <span>View Details</span>
                    </div>
                </div>`;
                
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }
        
        function escapeHtml(unsafe) {
            return (unsafe||'').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
