services:
  - type: web
    name: html-redesign-dashboard
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /login
        destination: /login-page.html
      - type: rewrite
        source: /dashboard
        destination: /index.html
