name: Smoke Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest fpdf2
      - name: Import check
        run: |
          python -c "import server, kwr_backend; print('imports OK')"
      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short || (echo "no tests yet"; exit 0)
      - name: Boot server + endpoint smoke
        run: |
          python tests/smoke_boot.py
