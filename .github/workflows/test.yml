name: Smoke Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest fpdf2 openpyxl
      - name: Import check
        run: |
          python -c "import server, kwr_backend; print('imports OK')"
      - name: Dashboard static safety checks
        run: |
          python -m py_compile server.py
          python - <<'PY'
          import pathlib, re, subprocess, sys
          html = pathlib.Path('index.html').read_text(encoding='utf-8')
          count = 0
          for i, match in enumerate(re.finditer(r'<script[^>]*>(.*?)</script>', html, re.S), 1):
              count = i
              temp = pathlib.Path(f'/tmp/dashboard_inline_script_{i}.js')
              temp.write_text(match.group(1), encoding='utf-8')
              result = subprocess.run(['node', '--check', str(temp)], capture_output=True, text=True)
              if result.returncode:
                  print('INLINE_SCRIPT_CHECK_FAILED', i, html[:match.start()].count('\n') + 1)
                  print(result.stderr or result.stdout)
                  sys.exit(result.returncode)
          print('INLINE_SCRIPT_CHECK_OK', count)
          PY
      - name: Secret pattern guard
        run: |
          python - <<'PY'
          import pathlib, re, sys
          patterns = {
              'ghp_': re.compile(r'ghp_[A-Za-z0-9_]{20,}'),
              'github_pat_': re.compile(r'github_pat_[A-Za-z0-9_]{20,}'),
              'AIza': re.compile(r'AIza[0-9A-Za-z_-]{20,}'),
              'sk-': re.compile(r'sk-[A-Za-z0-9]{20,}'),
          }
          skip = {
              '.github/workflows/test.yml',
              'tests/test_ci_dashboard_safety_workflow.py',
          }
          hits = []
          for path in pathlib.Path('.').rglob('*'):
              rel = path.as_posix()
              if rel.startswith('./'):
                  rel = rel[2:]
              if not path.is_file() or rel.startswith('.git/') or rel in skip:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      hits.append(f'{rel}: {name}')
          if hits:
              print('Secret-like patterns found:')
              print('\n'.join(hits))
              sys.exit(1)
          print('Secret pattern guard OK')
          PY
      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short
      - name: Boot server + endpoint smoke
        run: |
          python tests/smoke_boot.py
